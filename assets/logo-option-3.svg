<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e879f9"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad3)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.08" stroke="#a855f7" stroke-width="0.5">
    <line x1="20" y1="60"  x2="180" y2="60"/>
    <line x1="20" y1="100" x2="180" y2="100"/>
    <line x1="20" y1="140" x2="180" y2="140"/>
    <line x1="60"  y1="20" x2="60"  y2="180"/>
    <line x1="100" y1="20" x2="100" y2="180"/>
    <line x1="140" y1="20" x2="140" y2="180"/>
  </g>

  <!-- Connection lines between nodes -->
  <g opacity="0.5" stroke="#a855f7" stroke-width="1.2">
    <!-- center to outer nodes -->
    <line x1="100" y1="100" x2="100" y2="52"  />
    <line x1="100" y1="100" x2="148" y2="76"  />
    <line x1="100" y1="100" x2="148" y2="124" />
    <line x1="100" y1="100" x2="100" y2="148" />
    <line x1="100" y1="100" x2="52"  y2="124" />
    <line x1="100" y1="100" x2="52"  y2="76"  />
    <!-- ring connections -->
    <line x1="100" y1="52"  x2="148" y2="76"  opacity="0.3"/>
    <line x1="148" y1="76"  x2="148" y2="124" opacity="0.3"/>
    <line x1="148" y1="124" x2="100" y2="148" opacity="0.3"/>
    <line x1="100" y1="148" x2="52"  y2="124" opacity="0.3"/>
    <line x1="52"  y1="124" x2="52"  y2="76"  opacity="0.3"/>
    <line x1="52"  y1="76"  x2="100" y2="52"  opacity="0.3"/>
  </g>

  <!-- Outer nodes — 6 around a ring -->
  <g filter="url(#nodeGlow)">
    <circle cx="100" cy="52"  r="7" fill="url(#nodeGrad)" opacity="0.9"/>
    <circle cx="148" cy="76"  r="6" fill="url(#nodeGrad)" opacity="0.7"/>
    <circle cx="148" cy="124" r="5" fill="url(#nodeGrad)" opacity="0.6"/>
    <circle cx="100" cy="148" r="7" fill="url(#nodeGrad)" opacity="0.9"/>
    <circle cx="52"  cy="124" r="6" fill="url(#nodeGrad)" opacity="0.7"/>
    <circle cx="52"  cy="76"  r="5" fill="url(#nodeGrad)" opacity="0.6"/>
  </g>

  <!-- Center node -->
  <circle cx="100" cy="100" r="13" fill="url(#bgGrad3)" stroke="url(#nodeGrad2)" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="6"  fill="url(#nodeGrad2)" filter="url(#nodeGlow)"/>

  <!-- Wordmark -->
  <text x="100" y="178"
        font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
        font-size="17" font-weight="600"
        fill="url(#wordGrad)"
        text-anchor="middle" letter-spacing="2">dfiles</text>
</svg>
