<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1f2e"/>
    </linearGradient>
    <linearGradient id="accentGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <clipPath id="hexClip">
      <polygon points="100,8 174,50 174,150 100,192 26,150 26,50"/>
    </clipPath>
  </defs>

  <!-- Hexagon background -->
  <polygon points="100,8 174,50 174,150 100,192 26,150 26,50"
           fill="url(#bgGrad1)"/>

  <!-- Subtle inner glow ring -->
  <polygon points="100,18 166,57 166,143 100,182 34,143 34,57"
           fill="none" stroke="url(#accentGrad1)" stroke-width="1" opacity="0.3"/>

  <!-- Accent bar — horizontal line through middle -->
  <line x1="44" y1="100" x2="156" y2="100"
        stroke="url(#accentGrad1)" stroke-width="1.5" opacity="0.4"/>

  <!-- "df" monogram — monospace/terminal feel -->
  <!-- d -->
  <text x="52" y="122"
        font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
        font-size="62" font-weight="700"
        fill="#e2e8f0" letter-spacing="-2">d</text>

  <!-- f — electric blue -->
  <text x="105" y="122"
        font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
        font-size="62" font-weight="700"
        fill="url(#accentGrad1)">f</text>

  <!-- Dot — bottom right accent -->
  <circle cx="154" cy="144" r="4" fill="url(#accentGrad1)" opacity="0.8"/>
</svg>
