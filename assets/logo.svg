<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    Rosé Pine:  base #191724  overlay #26233a  highlight #403d52
                foam #9ccfd8  text #e0def4  iris #c4a7e7  subtle #908caa
    Tilde drawn as a path (no font). "haven" uses Helvetica/Arial.
  -->

  <!-- Hexagon background -->
  <polygon points="100,8 174,50 174,150 100,192 26,150 26,50"
           fill="#191724"/>

  <!-- Inner border ring -->
  <polygon points="100,18 166,57 166,143 100,182 34,143 34,57"
           fill="none" stroke="#403d52" stroke-width="1.2"/>

  <!-- Tilde — drawn as cubic bezier, centred at (100, 95) -->
  <path d="M 46 100
           C 54 80, 68 80, 78 92
           C 88 104, 102 116, 118 100
           C 128 88, 138 80, 150 92
           C 155 98, 157 103, 160 100"
        fill="none"
        stroke="#9ccfd8"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Glow echo -->
  <path d="M 46 100
           C 54 80, 68 80, 78 92
           C 88 104, 102 116, 118 100
           C 128 88, 138 80, 150 92
           C 155 98, 157 103, 160 100"
        fill="none"
        stroke="#9ccfd8"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.12"/>

  <!-- "haven" — Helvetica/Arial -->
  <text x="100" y="154"
        font-family="Helvetica, Arial, sans-serif"
        font-size="26"
        font-weight="300"
        text-anchor="middle"
        letter-spacing="6"
        fill="#e0def4">haven</text>

  <!-- Iris accent dot -->
  <circle cx="154" cy="169" r="3.5" fill="#c4a7e7"/>
</svg>
